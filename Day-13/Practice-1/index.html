    <div>
        <code id="code">
            <pre id="format" style="color: black;   "></pre>
        </code>
    </div>

    <script>
        (async function(place){
            const url = `https://api.openweathermap.org/data/2.5/weather?q=${place}&appid=81a5d39de1b847d6a3b7fbc04912b1f4`;
            let weatherData = await fetch(url);

            let d = await weatherData.json();

            let code = document.getElementById("#code");
            let format = document.querySelector("#format");

            format.textContent = JSON.stringify(d, null, 4);

            let gradus = d.main.temp - 273.15;
            
            console.log(Math.floor(gradus));

        })("yakutsk");
    </script>
