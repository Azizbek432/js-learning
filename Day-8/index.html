    <script>

        //     img.style.left = `${e.clientX - (img.offsetWidth / 2)}px`

        const btn = document.querySelector(".btn")
        meter = 0

        btn.addEventListener("click", () => {

            setInterval(() => {
                meter += 1
                btn.style.left = `${meter}px`
            }, 10)
        })
